{% extends "layouts/base_dashboard.html" %}

{% block title %} Dashboard {% endblock %}

{% block content %}

    <h2 class="title">Dashboard</h2>

        <p class="description">Please select an option</p>

        <nav class="navbar">
            <ul>
                <li><a class="dashboard-btn products-btn" href="{{ url_for('products.view_products') }}">Products</a></li>
                <li><a class="dashboard-btn blog-btn" href="{{ url_for('posts.view_post') }}">Blog</a></li>
            </ul>
        </nav>

        <form action="{{ url_for('auth.logout') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn-style">Logout</button>
        </form>
    
{% endblock %}
